name: Update Stream URLs

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install yt-dlp
        run: pip install -U yt-dlp

      - name: Run fetch script
        run: python fetch_streams.py || true

      - name: Commit and push streams.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add streams.json
          git diff --cached --quiet || git commit -m "chore: update streams.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
